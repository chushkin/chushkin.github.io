    <text x="96" y="810" fill="#10241f" font-family="Arial, sans-serif" font-size="44" font-weight="800">4.7</text>
    <text x="96" y="846" fill="#66746f" font-family="Arial, sans-serif" font-size="20">рейтинг</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="272" y="748" width="392" height="150" rx="26" fill="#ffffff"/>
    <text x="312" y="810" fill="#10241f" font-family="Arial, sans-serif" font-size="44" font-weight="800">500 тыс.+</text>
    <text x="312" y="846" fill="#66746f" font-family="Arial, sans-serif" font-size="20">установок в Google Play</text>
